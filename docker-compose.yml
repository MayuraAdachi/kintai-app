services:
  # Nginx
  nginx:
    image: nginx:alpine
    container_name: kintai_nginx
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - kintai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PHP-FPM
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: kintai_php
    volumes:
      - ./src:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
      - storage_data:/var/www/html/storage
    depends_on:
      - mysql
    networks:
      - kintai_network
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=kintai_db
      - DB_USERNAME=kintai_user
      - DB_PASSWORD=kintai_password
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: kintai_mysql
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: kintai_db
      MYSQL_USER: kintai_user
      MYSQL_PASSWORD: kintai_password
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --skip-log-bin
      --disable-log-bin
      --innodb-buffer-pool-size=128M
      --innodb-log-file-size=32M
      --innodb-flush-log-at-trx-commit=2
    networks:
      - kintai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # phpMyAdmin (開発用)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: kintai_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: kintai_user
      PMA_PASSWORD: kintai_password
    depends_on:
      - mysql
    networks:
      - kintai_network
    restart: unless-stopped

volumes:
  mysql_data:
  vendor_data:
  node_modules_data:
  storage_data:

networks:
  kintai_network:
    driver: bridge
